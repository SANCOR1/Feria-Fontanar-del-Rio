

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutograma de Producción - Fontanar del Río</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #fdfdfd; }
        .stage-badge { @apply text-[10px] font-black px-2 py-1 rounded uppercase tracking-tighter; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PROGRAMACION = [
            { orden: "-", act: "Instalación Carpas", ini: "1:30", fin: "2:00", dur: "-", pista: "-", tipo: "Logística" },
            { orden: "1", act: "Audio apertura (mientras los grupos se cambian)", ini: "2:00", fin: "2:01", dur: "-", pista: "Gemini", tipo: "Audio" },
            { orden: "-", act: "Adecuación mesas por grupo", ini: "2:01", fin: "2:15", dur: "-", pista: "-", tipo: "Logística" },
            { orden: "2", act: "Audio antes de comenzar las presentaciones", ini: "2:15", fin: "2:16", dur: "-", pista: "Gemini", tipo: "Audio" },
            { orden: "-", act: "Preparación vestuario", ini: "2:16", fin: "2:30", dur: "-", pista: "-", tipo: "Logística" },
            { orden: "3", act: "Audio de apertura", ini: "2:30", fin: "2:31", dur: "-", pista: "Gemini", tipo: "Audio" },
            { orden: "-", act: "Apertura Feria - Santiago Cortes", ini: "2:35", fin: "2:40", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "4.0", act: "Apertura Xiscuy Ticuy - Santiago Cortes", ini: "2:40", fin: "2:45", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "4", act: "Presentación Xiscuy Ticuy", ini: "2:45", fin: "2:55", dur: "0:08", pista: "Merengues campesinos (Cundiboyacense)", tipo: "Show" },
            { orden: "5.0", act: "Apertura Danza Apoteósica - Santiago Cortes", ini: "2:55", fin: "3:00", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "5", act: "Presentación Danza Apoteósica", ini: "3:00", fin: "3:05", dur: "0:05", pista: "Coqueta", tipo: "Show" },
            { orden: "6.0", act: "Apertura Danza Viva - Santiago Cortes", ini: "3:05", fin: "3:10", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "6", act: "Presentación Danza Viva", ini: "3:10", fin: "3:17", dur: "0:06", pista: "Ay cosita Linda", tipo: "Show" },
            { orden: "7.0", act: "Apertura Colectivo Tanz - Santiago Cortes", ini: "3:17", fin: "3:22", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "7", act: "Presentación Colectivo Tanz", ini: "3:22", fin: "3:25", dur: "0:10", pista: "clase de ballet en el Warm up.", tipo: "Show" },
            { orden: "-", act: "Break", ini: "3:25", fin: "3:40", dur: "-", pista: "-", tipo: "Logística" },
            { orden: "8.0", act: "Apertura Herencia en Movimiento - Santiago Cortes", ini: "3:40", fin: "3:45", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "8", act: "Herencia en Movimiento", ini: "3:45", fin: "4:00", dur: "0:13", pista: "Amor y cultura de mi tierra santa", tipo: "Show" },
            { orden: "9.0", act: "Apertura Paso a paso dejando huella - Santiago Cortes", ini: "4:00", fin: "4:05", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "9", act: "Presentación Paso a paso dejando huella", ini: "4:05", fin: "4:10", dur: "0:04", pista: "La Pringamosa - Aires Moniquireños", tipo: "Show" },
            { orden: "10.0", act: "Apertura Grupo luz de vida - Santiago Cortes", ini: "4:10", fin: "4:15", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "10", act: "Presentación Grupo Luz de vida", ini: "4:15", fin: "4:25", dur: "0:06", pista: "Tolu y quiero amanecer", tipo: "Show" },
            { orden: "11.0", act: "Apertura Folclor Latino - Santiago Cortes", ini: "4:25", fin: "4:30", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "11", act: "Presentación Folclor Latino", ini: "4:30", fin: "4:35", dur: "0:04", pista: "Grupo Libertad - Waitipan", tipo: "Show" },
            { orden: "12", act: "Folclor Latino", ini: "4:35", fin: "4:45", dur: "0:08", pista: "popurry danza indigena legado ancestral", tipo: "Show" },
            { orden: "13", act: "Presentación Xiscuy Ticuy", ini: "4:45", fin: "4:55", dur: "0:05", pista: "Mix de son sureño (Nariño)", tipo: "Show" },
            { orden: "14", act: "Presentación Colectivo Tanz", ini: "4:55", fin: "5:15", dur: "0:10", pista: "Ser Artista Mujer.", tipo: "Show" },
            { orden: "15", act: "Presentación Grupo Luz de vida", ini: "5:15", fin: "5:20", dur: "0:05", pista: "Pista Luz de vida", tipo: "Show" },
            { orden: "-", act: "Agradecimiento y cierre - Santiago Cortes", ini: "5:20", fin: "5:25", dur: "-", pista: "-", tipo: "Protocolo" },
            { orden: "-", act: "Vestuario y cierre evento", ini: "5:30", fin: "6:00", dur: "-", pista: "-", tipo: "Logística" },
            { orden: "-", act: "Desmontaje Carpas, sillas y Mesas", ini: "6:00", fin: "6:30", dur: "-", pista: "-", tipo: "Logística" }
        ];

        const App = () => {
            const [activeFilter, setActiveFilter] = useState('Todos');

            const filtered = PROGRAMACION.filter(i => activeFilter === 'Todos' || i.tipo === activeFilter);

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12">
                    <header className="mb-12 border-l-8 border-indigo-600 pl-6">
                        <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">MINUTOGRAMA OFICIAL</h1>
                        <p className="text-slate-500 font-medium">Evento: Parque Fontanar del Río | Consolidado Final</p>
                    </header>

                    <div className="flex flex-wrap gap-2 mb-8">
                        {['Todos', 'Show', 'Protocolo', 'Audio', 'Logística'].map(f => (
                            <button key={f} onClick={() => setActiveFilter(f)} 
                                className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${
                                    activeFilter === f ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-500 border hover:bg-slate-50'
                                }`}>
                                {f}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th className="p-4 text-[11px] font-black text-slate-400 uppercase text-center">Orden</th>
                                    <th className="p-4 text-[11px] font-black text-slate-400 uppercase">Actividad</th>
                                    <th className="p-4 text-[11px] font-black text-slate-400 uppercase text-center">Horario</th>
                                    <th className="p-4 text-[11px] font-black text-slate-400 uppercase">Pista</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filtered.map((item, idx) => (
                                    <tr key={idx} className="hover:bg-indigo-50/30 transition-colors">
                                        <td className="p-4 text-center font-mono text-sm font-bold text-slate-400">{item.orden}</td>
                                        <td className="p-4">
                                            <div className="text-sm font-bold text-slate-800 uppercase leading-tight">{item.act}</div>
                                            <span className={`stage-badge mt-1 inline-block ${
                                                item.tipo === 'Show' ? 'bg-purple-100 text-purple-600' :
                                                item.tipo === 'Protocolo' ? 'bg-amber-100 text-amber-600' :
                                                item.tipo === 'Audio' ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500'
                                            }`}>{item.tipo}</span>
                                        </td>
                                        <td className="p-4 text-center whitespace-nowrap">
                                            <span className="text-xs font-black text-slate-700 bg-slate-100 px-2 py-1 rounded">
                                                {item.ini} - {item.fin}
                                            </span>
                                        </td>
                                        <td className="p-4">
                                            <span className="text-xs font-semibold text-indigo-600 italic">
                                                {item.pista !== '-' ? item.pista : ''}
                                                {item.dur !== '-' && <span className="ml-2 text-slate-300 font-normal">({item.dur})</span>}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
